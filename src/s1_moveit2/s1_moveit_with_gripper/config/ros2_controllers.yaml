# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    gripper_controller:
      type: position_controllers/GripperActionController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - 1joint
      - 2joint
      - 3joint
      - 4joint
      - 5joint
      - 6joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
# gripper_controller:
#   ros__parameters:
#     joints:
#       - gripper_joint
#       - gripper_joint_2
gripper_controller:
  ros__parameters:
    joints:
      - gripper_joint
      - gripper_joint_2  # 添加第二个关节
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity